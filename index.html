<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <script type="text/javascript" src="main.js" defer></script>
    <title>BLOCK</title>
</head>

<body>
    <header id="header">
        <button id="theme-switch">
            <!--DARK--> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                fill="#e3e3e3">
                <path
                    d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z" />
            </svg>
            <!--LIGHT--><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" 
                fill="#EA3323">
                <path
                    d="M440-800v-120h80v120h-80Zm0 760v-120h80v120h-80Zm360-400v-80h120v80H800Zm-760 0v-80h120v80H40Zm708-252-56-56 70-72 58 58-72 70ZM198-140l-58-58 72-70 56 56-70 72Zm564 0-70-72 56-56 72 70-58 58ZM212-692l-72-70 58-58 70 72-56 56Zm98 382q-70-70-70-170t70-170q70-70 170-70t170 70q70 70 70 170t-70 170q-70 70-170 70t-170-70Z"/>
                </svg>
        </button>
    </header>

    <div id="time-wrapper" class="time-wrapper show-clock">
        <div class="time-box" id="time-box">
            <div class="input-mode">
                <input placeholder="00" id="hour-input">
                <span>:</span>
                <input placeholder="00" id="min-input">
                <span>:</span>
                <input placeholder="00" id="sec-input">
            </div>
        </div>
        <div id="timer"></div>
        <h1 id="current-time" class="clock">12:00:00</h1>
    </div>

    <div class="button-wrapper">
        <button class="item item-1" id="start-button">START</button>
        <button class="item item-2" id="restart-button">RESTART</button>
    </div>

    <div class="priority-wrapper">
        <div class="priority">
            <b>
                <div class="prio">HIGH PRIORITY</div>
            </b>
            <div class="list" id="high-list">

            </div>
        </div>
        <div class="priority">
            <b>
                <div class="prio">MEDIUM PRIORITY</div>
            </b>
            <div class="list" id="medium-list">

            </div>
        </div>
        <div class="priority">
            <b>
                <div class="prio">LOW PRIORITY</div>
            </b>
            <div class="list" id="low-list">

            </div>
        </div>
    </div>

    <div class="add-wrapper">
        <!--ADD--> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
            fill="#e3e3e3">
            <path d="M440-120v-320H120v-80h320v-320h80v320h320v80H520v320h-80Z" />
        </svg>
        <div class="new-task" id="add-task">Add new task...</div>
    </div>

    <div class="pop-wrapper" id="pop-wrapper">
        <div class="pop-content">
            <div class="pop-header">
                <h3>New Task</h3>
                <!--CROSS--> <svg id="close-task" xmlns="http://www.w3.org/2000/svg" height="24px"
                    viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                    <path
                        d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
                </svg>
            </div>
            <div class="title-wrapper-wrap">
                <div class="title-wrapper">
                    <!--TITLE--> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
                        width="24px" fill="#e3e3e3">
                        <path
                            d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h357l-80 80H200v560h560v-278l80-80v358q0 33-23.5 56.5T760-120H200Zm280-360ZM360-360v-170l367-367q12-12 27-18t30-6q16 0 30.5 6t26.5 18l56 57q11 12 17 26.5t6 29.5q0 15-5.5 29.5T897-728L530-360H360Zm481-424-56-56 56 56ZM440-440h56l232-232-28-28-29-28-231 231v57Zm260-260-29-28 29 28 28 28-28-28Z" />
                    </svg>
                    <b>
                        <div class="title">Title</div>
                    </b>
                    <input type="text" id="task-input">
                </div>
                <div class="pop-priority-wrapper">
                    <!--PRIORITY--> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
                        width="24px" fill="#e3e3e3">
                        <path d="M120-240v-80h240v80H120Zm0-200v-80h480v80H120Zm0-200v-80h720v80H120Z" />
                    </svg>
                    <b>
                        <div class="pop-priority">Priority</div>
                    </b>
                    <div class="pop-priority-class">
                        <button class="high priority-class" data-priority="high">High</button>
                        <button class="medium priority-class" data-priority="medium">Medium</button>
                        <button class="low priority-class" data-priority="low">Low</button>
                    </div>
                </div>
            </div>
            <hr>
            <div class="actions">
                <button id="reset-task">Reset</button>
                <button id="save-task">Save</button>
            </div>
        </div>
    </div>

    <div class="task-wrapper">
        <div class="task-completed">TASK COMPLETED:</div>
        <div class="task-status">
            <div class="task-finished" id="finished">0</div>
            /
            <div class="task-unfinished" id="unfinished">0</div>
        </div>
        <button id="view-button">VIEW</button>
        <button id="update-button">UPDATE</button>
    </div>

    <div class="view-task-wrapper" id="view-wrapper">
        <div class="view-content">
            <div class="view-header">
                <h3>Finished Tasks</h3>
                <!--CROSS--> <svg id="close-view" xmlns="http://www.w3.org/2000/svg" height="24px"
                    viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                    <path
                        d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
                </svg>
            </div>
            <div id="task-view-wrapper" class="task-view-wrapper">
            </div>
        </div>
    </div>

    <div class="skills-bar">
        <div class="progress-line-wrapper">
            <div class="progress-line"><span id="progress-fill"></span></div>
        </div>
    </div>
</body>

</html>
